AWSTemplateFormatVersion: "2010-09-09"
Description: Rearc Data Quest - S3 to SQS to Lambda pipeline

Parameters:
  RawBucketName:
    Type: String
    Description: Globally unique S3 bucket name for raw JSON data

Resources:
  RawDataBucket:
    Type: AWS::S3::Bucket
    DependsOn:
      - S3ToSqsQueuePolicy
    Properties:
      BucketName: !Ref RawBucketName
      VersioningConfiguration:
        Status: Enabled
      NotificationConfiguration:
        QueueConfigurations:
          - Event: s3:ObjectCreated:*
            Queue: !GetAtt RawDataQueue.Arn
            Filter:
              S3Key:
                Rules:
                  - Name: suffix
                    Value: .json

  RawDataQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: rearc-raw-data-queue
      VisibilityTimeout: 60

  S3ToSqsQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref RawDataQueue
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowS3ToSendMessages
            Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action:
              - sqs:SendMessage
            Resource: !GetAtt RawDataQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Sub "arn:aws:s3:::${RawBucketName}"

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: rearc-sqs-lambda-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action:
              - sts:AssumeRole
      Policies:
        - PolicyName: rearc-sqs-lambda-policy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "*"
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt RawDataQueue.Arn

  SqsProcessorLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: rearc-sqs-processor
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Timeout: 30
      Code:
        ZipFile: |
          import json

          def handler(event, context):
              print("Received SQS event:")
              print(json.dumps(event, indent=2))

              for record in event.get("Records", []):
                  body = json.loads(record["body"])
                  print("S3 event message:")
                  print(json.dumps(body, indent=2))

              return {
                  "statusCode": 200,
                  "body": "Processed SQS messages"
              }

  SqsToLambdaEventSourceMapping:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt RawDataQueue.Arn
      FunctionName: !Ref SqsProcessorLambda
      BatchSize: 1
      Enabled: true

Outputs:
  BucketName:
    Description: data-quest-scott-2026
    Value: !Ref RawDataBucket

  QueueUrl:
    Description: SQS queue URL
    Value: !Ref RawDataQueue

  QueueArn:
    Description: SQS queue ARN
    Value: !GetAtt RawDataQueue.Arn

  LambdaName:
    Description: Lambda processor function
    Value: !Ref SqsProcessorLambda
